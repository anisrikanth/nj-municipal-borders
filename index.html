<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Town Border Announcer</title>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex flex-col items-center justify-center min-h-screen p-4 font-sans">

    <div class="max-w-md w-full bg-gray-800 rounded-2xl shadow-xl p-6 text-center border border-gray-700">
        <h1 class="text-3xl font-bold mb-2 text-blue-400">NJ Border Announcer</h1>
        <p class="text-gray-400 text-sm mb-6">Drive around and hear when you cross a town line.</p>

        <div id="setup-section" class="mb-6">
            <div class="bg-gray-700 p-4 rounded-xl border border-gray-600 mb-4 text-center">
                <p class="text-sm text-gray-300 mb-4">Click below to download the map data into your phone's memory.</p>
                <button id="load-map-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-xl transition transform active:scale-95">
                    📥 Load NJ Map Data
                </button>
            </div>
            
            <p id="load-status" class="text-yellow-400 text-sm font-medium hidden">Downloading map data...</p>
        </div>

        <div id="dashboard" class="hidden">
            <div class="mb-6 p-6 bg-gray-900 rounded-xl border border-gray-700 shadow-inner">
                <p class="text-gray-400 uppercase tracking-wider text-xs font-bold mb-1">Current Town</p>
                <p id="town-display" class="text-2xl font-bold text-green-400">Locating...</p>
            </div>

            <div class="text-left text-sm text-gray-400 mb-6 bg-gray-900 p-4 rounded-lg font-mono">
                <p>Lat: <span id="lat-display">--</span></p>
                <p>Lng: <span id="lng-display">--</span></p>
            </div>

            <button id="start-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-6 rounded-xl transition transform active:scale-95 shadow-lg">
                ▶ Start Trip & Enable Audio
            </button>
            <button id="stop-btn" class="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-4 px-6 rounded-xl transition transform active:scale-95 shadow-lg hidden">
                ⏹ Stop Trip
            </button>
        </div>
    </div>

    <script>
        let geojsonData = null;
        let currentTown = null;
        let watchId = null;

        const loadMapBtn = document.getElementById('load-map-btn');
        const loadStatus = document.getElementById('load-status');
        const setupSection = document.getElementById('setup-section');
        const dashboard = document.getElementById('dashboard');
        const townDisplay = document.getElementById('town-display');
        const latDisplay = document.getElementById('lat-display');
        const lngDisplay = document.getElementById('lng-display');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');

        loadMapBtn.addEventListener('click', async function() {
            loadStatus.classList.remove('hidden');
            loadStatus.innerText = "Downloading map data (might take a second)...";
            loadMapBtn.disabled = true;
            loadMapBtn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                const response = await fetch('Municipal_Boundaries_of_NJ.geojson'); 
                if (!response.ok) throw new Error("File not found");
                
                geojsonData = await response.json();
                
                loadStatus.innerText = `Success! Loaded ${geojsonData.features.length} towns.`;
                loadStatus.classList.replace('text-yellow-400', 'text-green-400');
                
                setTimeout(() => {
                    setupSection.classList.add('hidden');
                    dashboard.classList.remove('hidden');
                }, 1000);

            } catch (error) {
                loadStatus.innerText = "Error loading file. Is the server running and filename correct?";
                loadStatus.classList.replace('text-yellow-400', 'text-red-400');
                loadMapBtn.disabled = false;
                loadMapBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });

        let availableVoices = [];
        window.speechSynthesis.onvoiceschanged = () => {
            availableVoices = window.speechSynthesis.getVoices();
        };

        function announceTown(townName) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(`Welcome to ${townName}`);
                
                if (availableVoices.length === 0) {
                    availableVoices = window.speechSynthesis.getVoices();
                }

                let preferredVoice = availableVoices.find(voice => voice.name.includes('Google US English'))
                                  || availableVoices.find(voice => voice.name.includes('Google') && voice.lang.includes('en-US'))
                                  || availableVoices.find(voice => voice.name.includes('Samantha'))
                                  || availableVoices.find(voice => voice.lang === 'en-US');
                
                if (preferredVoice) {
                    utterance.voice = preferredVoice;
                }

                utterance.rate = 0.95;
                utterance.pitch = 1.0;
                window.speechSynthesis.speak(utterance);
            } else {
                console.log("Text to speech not supported in this browser.");
            }
        }

        function checkLocation(lat, lng) {
            if (!geojsonData) return;

            const pt = turf.point([lng, lat]);
            let foundTown = "Unknown Territory";

            for (let feature of geojsonData.features) {
                if (turf.booleanPointInPolygon(pt, feature)) {
                    foundTown = feature.properties.NAME || feature.properties.name || "Unknown Town";
                    break;
                }
            }

            if (foundTown !== currentTown) {
                if (currentTown !== null && foundTown !== "Unknown Territory") {
                    announceTown(foundTown);
                }
                currentTown = foundTown;
                townDisplay.innerText = currentTown;
            }
        }

        startBtn.addEventListener('click', () => {
            if ('speechSynthesis' in window) {
                let silentUtterance = new SpeechSynthesisUtterance('');
                silentUtterance.volume = 0;
                window.speechSynthesis.speak(silentUtterance);
            }

            startBtn.classList.add('hidden');
            stopBtn.classList.remove('hidden');
            townDisplay.innerText = "Waiting for GPS...";

            if ("geolocation" in navigator) {
                watchId = navigator.geolocation.watchPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        
                        latDisplay.innerText = lat.toFixed(5);
                        lngDisplay.innerText = lng.toFixed(5);

                        checkLocation(lat, lng);
                    },
                    (error) => {
                        console.error("GPS Error:", error);
                        townDisplay.innerText = "GPS Error/Denied";
                    },
                    {
                        enableHighAccuracy: true,
                        maximumAge: 0,
                        timeout: 5000
                    }
                );
            } else {
                townDisplay.innerText = "GPS not supported";
            }
        });

        stopBtn.addEventListener('click', () => {
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            startBtn.classList.remove('hidden');
            stopBtn.classList.add('hidden');
            townDisplay.innerText = "Trip Paused";
        });

    </script>
</body>
</html>
